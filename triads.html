<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FretLab - Triads</title>
    <link href="assets/bootstrap.min.css" rel="stylesheet">
    <link href="assets/app.css" rel="stylesheet">
  </head>
  <body data-tool="triads">
    <main class="app-shell">
      <header class="app-header">
        <div class="container-fluid px-3 px-lg-4">
          <div class="d-flex flex-column flex-lg-row align-items-lg-end justify-content-between gap-3">
            <div>
              <h1 class="app-title mb-2"><span class="title-accent">Fret</span>Lab</h1>
              <p class="app-subtitle mb-3">Triads and compact chord tones on one playable map.</p>
              <nav class="tool-nav" aria-label="FretLab tools">
                <a class="tool-nav-link" href="index.html">Scales</a>
                <a class="tool-nav-link" href="progressions.html">Progressions</a>
                <a class="tool-nav-link is-active" href="triads.html">Triads</a>
              </nav>
            </div>
            <div class="session-strip session-strip--triads" aria-label="Current session">
              <div>
                <span class="session-label">Instrument</span>
                <strong id="sessionInstrument">Guitar</strong>
              </div>
              <div>
                <span class="session-label">Tuning</span>
                <strong id="sessionTuning">Standard</strong>
              </div>
              <div>
                <span class="session-label">Root</span>
                <strong id="sessionKey">C</strong>
              </div>
              <div>
                <span class="session-label">Triad</span>
                <strong id="sessionChord">C</strong>
              </div>
            </div>
          </div>
        </div>
      </header>

      <section class="control-bar">
        <div class="container-fluid px-3 px-lg-4">
          <div class="controls-grid">
            <div class="control-field">
              <label for="instrumentSelect" class="form-label">Instrument</label>
              <select id="instrumentSelect" class="form-select"></select>
            </div>
            <div class="control-field">
              <label for="tuningSelect" class="form-label">Tuning</label>
              <select id="tuningSelect" class="form-select"></select>
            </div>
            <div class="control-field">
              <label for="keySelect" class="form-label">Root</label>
              <select id="keySelect" class="form-select"></select>
            </div>
            <div class="control-field">
              <label for="triadQualitySelect" class="form-label">Quality</label>
              <select id="triadQualitySelect" class="form-select"></select>
            </div>
            <div class="control-field">
              <label for="labelMode" class="form-label">Labels</label>
              <select id="labelMode" class="form-select">
                <option value="notes">Notes</option>
                <option value="intervals">Intervals</option>
              </select>
            </div>
            <div class="control-field">
              <label for="fretCount" class="form-label">Frets</label>
              <select id="fretCount" class="form-select">
                <option value="12">0-12</option>
                <option value="15">0-15</option>
                <option value="17">0-17</option>
                <option value="20">0-20</option>
                <option value="24">0-24</option>
              </select>
            </div>
            <div class="control-field control-field--position">
              <label for="positionSelect" class="form-label">Position</label>
              <select id="positionSelect" class="form-select"></select>
            </div>
          </div>
        </div>
      </section>

      <section class="container-fluid px-3 px-lg-4 py-4">
        <div class="row g-4">
          <div class="col-12 col-xl-8">
            <section class="panel" aria-labelledby="fretboardTitle">
              <div class="panel-heading">
                <div>
                  <h2 id="fretboardTitle" class="panel-title">Fretboard</h2>
                  <p id="fretboardSummary" class="panel-copy mb-0">Standard tuning, high E on top.</p>
                </div>
              </div>
              <div class="fretboard-scroll" tabindex="0">
                <div id="fretboard" class="fretboard"></div>
              </div>
            </section>
          </div>

          <div class="col-12 col-xl-4">
            <section class="panel mb-4" aria-labelledby="layersTitle">
              <div class="panel-heading">
                <div>
                  <h2 id="layersTitle" class="panel-title">Triad layers</h2>
                </div>
              </div>
              <div class="layer-grid">
                <input class="btn-check layer-toggle" type="checkbox" id="layerTriads" data-layer="triads" checked>
                <label class="btn btn-outline-dark layer-button" for="layerTriads">
                  <span class="layer-dot triad"></span>
                  Triad tones
                </label>

                <input class="btn-check layer-toggle" type="checkbox" id="layerRootFifth" data-layer="rootFifth">
                <label class="btn btn-outline-dark layer-button" for="layerRootFifth">
                  <span class="layer-dot root-fifth"></span>
                  Root + fifth
                </label>
              </div>
              <div class="mt-3">
                <label for="focusMode" class="form-label">Focus</label>
                <select id="focusMode" class="form-select">
                  <option value="all">All active layers</option>
                  <option value="triadTones">Triad tones</option>
                  <option value="rootFifth">Root + fifth</option>
                </select>
              </div>
            </section>

            <section class="panel" aria-labelledby="currentChordTitle">
              <div class="panel-heading">
                <div>
                  <h2 id="currentChordTitle" class="panel-title">Current triad</h2>
                </div>
              </div>
              <div class="current-chord">
                <div>
                  <span id="currentRoman" class="roman-badge">Triad</span>
                  <strong id="currentChordName">C</strong>
                </div>
                <p id="currentChordFunction" class="panel-copy mb-0"></p>
              </div>
              <div class="detail-list mt-4">
                <div>
                  <span>Triad tones</span>
                  <strong id="triadToneList"></strong>
                </div>
                <div>
                  <span>Targets</span>
                  <strong id="targetNoteList"></strong>
                </div>
                <div>
                  <span>Root + fifth</span>
                  <strong id="rootFifthList"></strong>
                </div>
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>

    <script src="assets/data.js" defer></script>
    <script src="assets/app.js" defer></script>
  </body>
</html>
